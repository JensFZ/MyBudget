services:
  app:
    build:
      context: .
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-}
    ports:
      - "3000:3000"
    volumes:
      - budget_data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Public URL used for vault invite links – set to your domain or IP
      - APP_URL=http://localhost:3000

volumes:
  budget_data:
